events {
    worker_connections 1024;
}

http {
    # ── Upstream: Node.js app ──────────────────────────
    upstream app {
        server backend:3000;
        keepalive 32;
    }

    # ── Rate limiting zones (Nginx layer) ─────────────
    # Outer rate limit: 60 req/min per IP (1 r/s)
    limit_req_zone $binary_remote_addr zone=api_global:10m rate=10r/s;
    # Strict limit for /shorten
    limit_req_zone $binary_remote_addr zone=shorten:10m rate=2r/s;

    # ── Logging ────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    # ── Performance ────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    gzip                on;
    gzip_types          text/plain application/json application/javascript text/css;
    gzip_min_length     256;

    server {
        listen 80;
        server_name _;

        # Max body size (prevent abuse on /shorten)
        client_max_body_size 10k;

        # Security headers
        add_header X-Frame-Options          "SAMEORIGIN"   always;
        add_header X-Content-Type-Options   "nosniff"      always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Referrer-Policy          "no-referrer"  always;

        # ── Health check (bypass rate limit) ──────────
        location = /api/health {
            proxy_pass http://app;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        }

        # ── POST /shorten — stricter rate limit ───────
        location = /shorten {
            limit_req zone=shorten burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://app;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header Connection         "";
            proxy_http_version 1.1;
        }

        # ── Everything else ───────────────────────────
        location / {
            limit_req zone=api_global burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://app;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header Connection         "";
            proxy_http_version 1.1;

            # Cache redirect responses at Nginx level
            proxy_cache_valid 302 30s;
        }
    }
}
